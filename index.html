<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Morse Flashcards</title>
  <link rel="icon" type="image/x-icon" href="fav.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>

    <header>
      <h1>Morse</h1>
      <div class="header-right">
        <button id="theme-toggle" aria-label="Cambiar modo"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
        <span id="level-indicator">Nivel 1</span>
      </div>
    </header>

    <main>
      <div id="card">
        <div class="card-face card-front">
          <div class="flip-hint">↺</div>
          <div id="card-letter"></div>
          <div id="input-display"></div>
          <div id="correct-morse" class="hidden"></div>
        </div>
        <div class="card-face card-back">
          <div class="back-label">Respuesta</div>
          <div id="card-answer"></div>
        </div>
      </div>

      <button id="flip-btn">↺ Ver respuesta</button>

      <div id="telegraph-btn">
        <span id="btn-label">PULSA</span>
      </div>

      <p id="instruction">Presiona la barra espaciadora o el botón para enviar código Morse. Pulsación corta = punto (·), pulsación larga = raya (—).</p>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
